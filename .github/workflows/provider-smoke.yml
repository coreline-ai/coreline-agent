name: Provider Smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      targets:
        description: "Comma-separated targets: compatible, anthropic, openai, gemini, cloud, all"
        required: false
        default: cloud
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: provider-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-safe:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run CI-safe provider smoke
        run: bun run smoke:provider:ci-safe

  manual-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      CORELINE_OAI_BASE_URL: ${{ vars.CORELINE_OAI_BASE_URL }}
      CORELINE_OAI_MODEL: ${{ vars.CORELINE_OAI_MODEL }}
      CORELINE_OAI_API_KEY: ${{ secrets.CORELINE_OAI_API_KEY }}
      CORELINE_ANTHROPIC_MODEL: ${{ vars.CORELINE_ANTHROPIC_MODEL }}
      CORELINE_OPENAI_MODEL: ${{ vars.CORELINE_OPENAI_MODEL }}
      CORELINE_GEMINI_MODEL: ${{ vars.CORELINE_GEMINI_MODEL }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run manual provider smoke
        shell: bash
        run: |
          set -euo pipefail
          TARGETS="${{ inputs.targets }}"
          IFS=',' read -ra TARGET_LIST <<< "$TARGETS"
          run_target() {
            local target="${1// /}"
            case "$target" in
              compatible)
                if [[ -z "${CORELINE_OAI_BASE_URL:-}" || -z "${CORELINE_OAI_MODEL:-}" ]]; then
                  echo "SKIP compatible: CORELINE_OAI_BASE_URL / CORELINE_OAI_MODEL missing"
                  return 0
                fi
                CORELINE_RUN_PROVIDER_SMOKE=1 CORELINE_PROVIDER_SMOKE_TARGETS=compatible bun test tests/provider-smoke.test.ts
                ;;
              anthropic)
                if [[ -z "${ANTHROPIC_API_KEY:-}" ]]; then
                  echo "SKIP anthropic: ANTHROPIC_API_KEY missing"
                  return 0
                fi
                CORELINE_RUN_PROVIDER_SMOKE=1 CORELINE_PROVIDER_SMOKE_TARGETS=anthropic bun test tests/provider-smoke.test.ts
                ;;
              openai)
                if [[ -z "${OPENAI_API_KEY:-}" ]]; then
                  echo "SKIP openai: OPENAI_API_KEY missing"
                  return 0
                fi
                CORELINE_RUN_PROVIDER_SMOKE=1 CORELINE_PROVIDER_SMOKE_TARGETS=openai bun test tests/provider-smoke.test.ts
                ;;
              gemini)
                if [[ -z "${GOOGLE_API_KEY:-}" ]]; then
                  echo "SKIP gemini: GOOGLE_API_KEY missing"
                  return 0
                fi
                CORELINE_RUN_PROVIDER_SMOKE=1 CORELINE_PROVIDER_SMOKE_TARGETS=gemini bun test tests/provider-smoke.test.ts
                ;;
              cloud)
                run_target anthropic
                run_target openai
                run_target gemini
                ;;
              all)
                run_target compatible
                run_target cloud
                ;;
              "")
                ;;
              *)
                echo "Unknown smoke target: $target"
                exit 1
                ;;
            esac
          }
          for target in "${TARGET_LIST[@]}"; do
            run_target "$target"
          done

  nightly-safe:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      CORELINE_ANTHROPIC_MODEL: ${{ vars.CORELINE_ANTHROPIC_MODEL }}
      CORELINE_OPENAI_MODEL: ${{ vars.CORELINE_OPENAI_MODEL }}
      CORELINE_GEMINI_MODEL: ${{ vars.CORELINE_GEMINI_MODEL }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run nightly-safe provider smoke
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ANTHROPIC_API_KEY:-}" && -z "${OPENAI_API_KEY:-}" && -z "${GOOGLE_API_KEY:-}" ]]; then
            echo "SKIP nightly-safe: no cloud provider keys configured"
            exit 0
          fi
          bun run smoke:provider:nightly-safe
